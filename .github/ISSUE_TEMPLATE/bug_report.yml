name: Bug report
description: Report a reproducible problem in pyGDIS
title: "[Bug]: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Problem
      description: Describe the unexpected behavior and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproducible example
      render: python
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: pyGDIS version
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Python, operating system, NumPy, SciPy, and installation method.
